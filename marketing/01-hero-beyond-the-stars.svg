<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="50%" stop-color="#0d0d2a"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="alkaidGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="25%" stop-color="#e0d4ff" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Background stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="160" r="1.5" opacity="0.7"/>
    <circle cx="250" cy="90" r="1" opacity="0.5"/>
    <circle cx="400" cy="200" r="1.2" opacity="0.6"/>
    <circle cx="560" cy="80" r="1" opacity="0.5"/>
    <circle cx="720" cy="170" r="1.8" opacity="0.8"/>
    <circle cx="880" cy="120" r="1.2" opacity="0.6"/>
    <circle cx="980" cy="220" r="1" opacity="0.5"/>
    <circle cx="90" cy="380" r="1.3" opacity="0.6"/>
    <circle cx="150" cy="540" r="1" opacity="0.5"/>
    <circle cx="980" cy="430" r="1.6" opacity="0.7"/>
    <circle cx="930" cy="620" r="1" opacity="0.5"/>
    <circle cx="80" cy="720" r="1.5" opacity="0.7"/>
    <circle cx="200" cy="1100" r="1.2" opacity="0.6"/>
    <circle cx="380" cy="1180" r="1" opacity="0.5"/>
    <circle cx="620" cy="1130" r="1.4" opacity="0.6"/>
    <circle cx="850" cy="1210" r="1.2" opacity="0.6"/>
    <circle cx="980" cy="1070" r="1" opacity="0.5"/>
    <circle cx="340" cy="1000" r="0.8" opacity="0.4"/>
    <circle cx="780" cy="980" r="0.9" opacity="0.5"/>
  </g>

  <!-- Big Dipper constellation -->
  <g stroke="#7c3aed" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.55">
    <line x1="280" y1="520" x2="430" y2="470"/>
    <line x1="430" y1="470" x2="470" y2="620"/>
    <line x1="470" y1="620" x2="320" y2="660"/>
    <line x1="320" y1="660" x2="280" y2="520"/>
    <line x1="430" y1="470" x2="580" y2="440"/>
    <line x1="580" y1="440" x2="720" y2="400"/>
    <line x1="720" y1="400" x2="820" y2="340"/>
  </g>

  <!-- Stars of the dipper -->
  <g>
    <circle cx="280" cy="520" r="22" fill="url(#starGlow)"/>
    <circle cx="280" cy="520" r="5" fill="#ffffff"/>
    <circle cx="430" cy="470" r="22" fill="url(#starGlow)"/>
    <circle cx="430" cy="470" r="5" fill="#ffffff"/>
    <circle cx="470" cy="620" r="22" fill="url(#starGlow)"/>
    <circle cx="470" cy="620" r="5" fill="#ffffff"/>
    <circle cx="320" cy="660" r="22" fill="url(#starGlow)"/>
    <circle cx="320" cy="660" r="5" fill="#ffffff"/>
    <circle cx="580" cy="440" r="22" fill="url(#starGlow)"/>
    <circle cx="580" cy="440" r="5" fill="#ffffff"/>
    <circle cx="720" cy="400" r="22" fill="url(#starGlow)"/>
    <circle cx="720" cy="400" r="5" fill="#ffffff"/>
    <!-- Alkaid: the last star, bright and glowing purple -->
    <circle cx="820" cy="340" r="90" fill="url(#alkaidGlow)"/>
    <circle cx="820" cy="340" r="14" fill="#ffffff"/>
  </g>

  <!-- Alkaid label -->
  <text x="820" y="260" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="4">ALKAID</text>

  <!-- Title block -->
  <text x="540" y="900" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="108" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">Beyond</text>
  <text x="540" y="1020" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="108" font-weight="800" fill="url(#accentGrad)" text-anchor="middle" letter-spacing="-2">the Stars</text>

  <!-- Subhead -->
  <text x="540" y="1100" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#a1a1b5" text-anchor="middle" letter-spacing="1">Multi-model AI chat. Six models. One constellation.</text>

  <!-- URL pill -->
  <rect x="340" y="1200" width="400" height="70" rx="35" fill="url(#accentGrad)"/>
  <text x="540" y="1246" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">chat.alkaidiq.com</text>
</svg>
