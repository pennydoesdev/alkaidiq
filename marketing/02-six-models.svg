<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1f45" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#141432" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Subtle starfield -->
  <g fill="#ffffff" opacity="0.35">
    <circle cx="100" cy="200" r="1"/>
    <circle cx="250" cy="120" r="1.2"/>
    <circle cx="500" cy="80" r="1"/>
    <circle cx="780" cy="150" r="1.4"/>
    <circle cx="950" cy="220" r="1"/>
    <circle cx="60" cy="800" r="1"/>
    <circle cx="1020" cy="900" r="1.2"/>
    <circle cx="120" cy="1280" r="1"/>
    <circle cx="960" cy="1250" r="1.3"/>
  </g>

  <!-- Header -->
  <text x="540" y="170" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="36" font-weight="600" fill="#a1a1b5" text-anchor="middle" letter-spacing="6">ALKAID AI</text>
  <text x="540" y="280" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="92" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">Six models.</text>
  <text x="540" y="380" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="92" font-weight="800" fill="url(#accentGrad)" text-anchor="middle" letter-spacing="-2">One chat.</text>

  <!-- Grid of 6 model cards, 3 rows x 2 cols -->
  <!-- Row 1 -->
  <g>
    <rect x="80" y="470" width="445" height="200" rx="24" fill="url(#cardGrad)" stroke="#2d2d5a" stroke-width="1"/>
    <circle cx="160" cy="545" r="32" fill="#3b82f6" opacity="0.2"/>
    <text x="160" y="560" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="36" font-weight="800" fill="#60a5fa" text-anchor="middle">B</text>
    <text x="220" y="540" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Alkaid Basic</text>
    <text x="220" y="580" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#a1a1b5">Qwen 2.5 7B • Free</text>
    <text x="220" y="625" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#7a7a95">Fast, lightweight chat</text>
  </g>
  <g>
    <rect x="555" y="470" width="445" height="200" rx="24" fill="url(#cardGrad)" stroke="#2d2d5a" stroke-width="1"/>
    <circle cx="635" cy="545" r="32" fill="#7c3aed" opacity="0.25"/>
    <circle cx="635" cy="545" r="10" fill="#c4b5fd"/>
    <text x="695" y="540" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Orb</text>
    <text x="695" y="580" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#c4b5fd">Qwen 2.5 72B • Orb</text>
    <text x="695" y="625" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#7a7a95">Flagship reasoning</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="80" y="690" width="445" height="200" rx="24" fill="url(#cardGrad)" stroke="#2d2d5a" stroke-width="1"/>
    <rect x="130" y="520" width="60" height="60" rx="12" fill="none"/>
    <path d="M 135 545 L 155 525 L 175 545 L 155 565 Z" fill="none" stroke="#c4b5fd" stroke-width="3" transform="translate(5, 225)"/>
    <text x="160" y="775" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="32" font-weight="800" fill="#c4b5fd" text-anchor="middle">{ }</text>
    <text x="220" y="760" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Orb Code</text>
    <text x="220" y="800" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#c4b5fd">Qwen3 Coder • Orb</text>
    <text x="220" y="845" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#7a7a95">Built for programmers</text>
  </g>
  <g>
    <rect x="555" y="690" width="445" height="200" rx="24" fill="url(#cardGrad)" stroke="#2d2d5a" stroke-width="1"/>
    <text x="635" y="775" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="42" font-weight="800" fill="#c4b5fd" text-anchor="middle">∇</text>
    <text x="695" y="760" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Orb DeepSeek</text>
    <text x="695" y="800" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#c4b5fd">DeepSeek V3.2 • Orb</text>
    <text x="695" y="845" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#7a7a95">Deep reasoning engine</text>
  </g>

  <!-- Row 3 -->
  <g>
    <rect x="80" y="910" width="445" height="200" rx="24" fill="url(#cardGrad)" stroke="#2d2d5a" stroke-width="1"/>
    <text x="160" y="995" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="48" font-weight="800" fill="#c4b5fd" text-anchor="middle">◉</text>
    <text x="220" y="980" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Orb Sight</text>
    <text x="220" y="1020" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#c4b5fd">FLUX • Orb</text>
    <text x="220" y="1065" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#7a7a95">Text-to-image generation</text>
  </g>
  <g>
    <rect x="555" y="910" width="445" height="200" rx="24" fill="url(#cardGrad)" stroke="#2d2d5a" stroke-width="1"/>
    <g transform="translate(635, 995)">
      <rect x="-8" y="-22" width="16" height="30" rx="8" fill="#c4b5fd"/>
      <path d="M -18 4 Q 0 22 18 4" stroke="#c4b5fd" stroke-width="3" fill="none" stroke-linecap="round"/>
      <line x1="0" y1="10" x2="0" y2="20" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="695" y="980" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Orb Talk</text>
    <text x="695" y="1020" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#c4b5fd">Deepgram Aura-2 • Orb</text>
    <text x="695" y="1065" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#7a7a95">Real-time voice chat</text>
  </g>

  <!-- CTA pill -->
  <rect x="340" y="1200" width="400" height="80" rx="40" fill="url(#accentGrad)"/>
  <text x="540" y="1252" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">chat.alkaidiq.com</text>
</svg>
