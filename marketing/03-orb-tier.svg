    <circle cx="300" cy="80" r="1"/>
    <circle cx="750" cy="110" r="1.3"/>
    <circle cx="950" cy="180" r="1"/>
    <circle cx="80" cy="560" r="1"/>
    <circle cx="1010" cy="640" r="1.2"/>
    <circle cx="150" cy="1220" r="1.1"/>
    <circle cx="900" cy="1280" r="1"/>
  </g>

  <!-- Orb visual -->
  <circle cx="540" cy="380" r="220" fill="url(#orbHalo)"/>
  <circle cx="540" cy="380" r="120" fill="url(#orbFill)"/>
  <g stroke="#c4b5fd" stroke-width="1.5" opacity="0.65" fill="none">
    <line x1="540" y1="200" x2="540" y2="560"/>
    <line x1="360" y1="380" x2="720" y2="380"/>
    <line x1="420" y1="260" x2="660" y2="500"/>
